name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v3.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type-check
        working-directory: packages/bl1nk
        run: pnpm run build:tsc

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Validate exporters
        run: node scripts/validate-exporters.mjs

      - name: Biome check
        working-directory: packages/bl1nk
        run: pnpm run check

      - name: Verify tool registration
        run: |
          node -e "
            const { GRANULAR_TOOLS, BL1NK_VISUAL_TOOLS, Schemas } = await import('./packages/bl1nk/dist/index.js');
            if (GRANULAR_TOOLS.length !== 11) { console.error('Expected 11 granular tools'); process.exit(1); }
            if (BL1NK_VISUAL_TOOLS.length !== 4) { console.error('Expected 4 legacy tools'); process.exit(1); }
            if (Object.keys(Schemas).length !== 11) { console.error('Expected 11 schemas'); process.exit(1); }
            console.log('Tool registration verified: 11 granular + 4 legacy + 11 schemas');
          "

      - name: Create GitHub Release
        if: matrix.node-version == 22
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            packages/bl1nk/dist/index.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
