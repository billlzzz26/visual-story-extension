name: Format

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # เปลี่ยนเป็น --no-frozen-lockfile เพื่อข้าม Error ของ pnpm-lock.yaml
      - run: pnpm install --no-frozen-lockfile

      - name: Check formatting (bl1nk)
        working-directory: packages/bl1nk
        run: npx @biomejs/biome format .

      - name: Check markdown
        run: pnpm run lint
