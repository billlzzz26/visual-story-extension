name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# เพิ่ม env เพื่อรองรับ Node.js 24 ตามคำแนะนำของ GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # แก้ไขให้ยอมรับ lockfile ที่ไม่เป็นปัจจุบันเพื่อให้รันผ่าน
      - run: pnpm install --no-frozen-lockfile

      - name: Biome lint + format (bl1nk)
        working-directory: packages/bl1nk
        run: pnpm run check

      - name: TypeScript type-check (bl1nk)
        working-directory: packages/bl1nk
        run: pnpm run build:tsc

      - name: Markdown lint
        run: pnpm run lint
        